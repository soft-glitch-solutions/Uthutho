name: Deploy via lftp

on:
  push:
    branches:
      - main
      - shaqeel
      - Mahki
      - Ishmael
      - mirror

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build app
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
        run: |
          npm install undici@5.22.1 --save-exact --legacy-peer-deps
          npx expo export -p web

      - name: Set deployment directory
        id: set-dir
        run: |
          BRANCH="${GITHUB_REF##*/}"

          if [[ "$BRANCH" == "shaqeel" ]]; then
            echo "DIR=/public_html/shaqeel/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "Mahki" ]]; then
            echo "DIR=/public_html/makhi/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "mirror" ]]; then
            echo "DIR=/public_html/mirror/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "Ishmael" ]]; then
            echo "DIR=/public_html/ishmael/" >> $GITHUB_OUTPUT

          else
            echo "DIR=/public_html/mobile/" >> $GITHUB_OUTPUT
          fi

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy using lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_DIR: ${{ steps.set-dir.outputs.DIR }}
        run: |
          lftp -c "
          set ftp:ssl-allow yes;
          set ssl:verify-certificate no;
          open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
          mirror -R dist/ $REMOTE_DIR --delete --verbose
          "