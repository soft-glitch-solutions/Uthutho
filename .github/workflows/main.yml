name: Deploy via FTPS

on:
  push:
    branches:
      - main
      - shaqeel
      - Mahki
      - Ishmael
      - mirror

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build Expo Web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
        run: |
          npm install undici@5.22.1 --save-exact --legacy-peer-deps
          npx expo export --platform web

      # ----------------------------------------
      # IMPORTANT DEBUG STEP
      # Shows what actually got built
      # ----------------------------------------
      - name: Verify build output
        run: |
          echo "==== DIST FILES ===="
          find dist -type f | head -50

      # ----------------------------------------
      # SET CORRECT REMOTE DIRECTORY
      # ----------------------------------------
      - name: Set deploy directory
        id: set-dir
        run: |
          BRANCH="${GITHUB_REF##*/}"

          if [[ "$BRANCH" == "shaqeel" ]]; then
            echo "DIR=/shaqeel.uthutho.co.za/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "Mahki" ]]; then
            echo "DIR=/makhi.uthutho.co.za/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "mirror" ]]; then
            echo "DIR=/mirror.uthutho.co.za/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "Ishmael" ]]; then
            echo "DIR=/ishmael.uthutho.co.za/" >> $GITHUB_OUTPUT

          else
            echo "DIR=/mobile.uthutho.co.za/" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------
      # DEPLOY
      # ----------------------------------------
      - name: Deploy to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          protocol: ftps
          security: loose
          port: 21

          local-dir: dist/
          server-dir: ${{ steps.set-dir.outputs.DIR }}

          # DELETE OLD FILES
          dangerous-clean-slate: true

          # FORCE FULL UPLOAD
          state-name: .ftp-deploy-sync-state-v2.json

          log-level: verbose
          timeout: 120000

          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**