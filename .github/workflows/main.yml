name: Deploy via SFTP

on:
  push:
    branches:
      - main
      - shaqeel
      - Mahki
      - Ishmael
      - mirror

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # CHECKOUT
      # ----------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------
      # NODE
      # ----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ----------------------------------------
      # INSTALL
      # ----------------------------------------
      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      # ----------------------------------------
      # BUILD EXPO WEB
      # ----------------------------------------
      - name: Build Expo Web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
          EXPO_PUBLIC_GOOGLE_PLACES_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_PLACES_API_KEY }}
        run: |
          npm install undici@5.22.1 --save-exact --legacy-peer-deps
          npx expo export --platform web

      # ----------------------------------------
      # VERIFY BUILD
      # ----------------------------------------
      - name: Verify build output
        run: |
          echo "==== DIST FILES ===="
          ls -la dist/
          echo "Total files: $(find dist -type f | wc -l)"

      # ----------------------------------------
      # SET DEPLOY DIRECTORY
      # ----------------------------------------
      - name: Set deploy directory
        id: set-dir
        run: |
          BRANCH="${GITHUB_REF##*/}"

          if [[ "$BRANCH" == "shaqeel" ]]; then
            echo "DIR=/home/bpyshwey/public_html/shaqeel" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "Mahki" ]]; then
            echo "DIR=/home/bpyshwey/public_html/makhi" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "mirror" ]]; then
            echo "DIR=/home/bpyshwey/public_html/mirror" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "Ishmael" ]]; then
            echo "DIR=/home/bpyshwey/public_html/ishmael" >> $GITHUB_OUTPUT
          else
            echo "DIR=/home/bpyshwey/mobile.uthutho.co.za" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------
      # DEBUG: Show deployment path
      # ----------------------------------------
      - name: Show deployment path
        run: |
          echo "Deploying to: ${{ steps.set-dir.outputs.DIR }}"
          echo "Branch: ${GITHUB_REF##*/}"

      # ----------------------------------------
      # INSTALL LFTP AND DEPLOY VIA SFTP
      # ----------------------------------------
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -a -x'
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} -p 1624 sftp://51.89.20.167
            mkdir -p ${{ steps.set-dir.outputs.DIR }}
            mirror -R --verbose --delete --no-perms --ignore-time ./dist/ ${{ steps.set-dir.outputs.DIR }}/
            quit
          "

      # ----------------------------------------
      # VERIFY DEPLOYMENT
      # ----------------------------------------
      - name: Verify deployment
        run: |
          echo "✅ Successfully deployed to: ${{ steps.set-dir.outputs.DIR }}"
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} -p 1624 sftp://51.89.20.167
            cls -la ${{ steps.set-dir.outputs.DIR }} | head -20
            quit
          "