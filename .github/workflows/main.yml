name: Deploy via SFTP

on:
  push:
    branches:
      - main
      - shaqeel
      - Mahki
      - Ishmael
      - mirror

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # CHECKOUT
      # ----------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------
      # NODE
      # ----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ----------------------------------------
      # INSTALL
      # ----------------------------------------
      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      # ----------------------------------------
      # BUILD EXPO WEB
      # ----------------------------------------
      - name: Build Expo Web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
          EXPO_PUBLIC_GOOGLE_PLACES_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_PLACES_API_KEY }}
        run: |
          npm install undici@5.22.1 --save-exact --legacy-peer-deps
          npx expo export --platform web

      # ----------------------------------------
      # VERIFY BUILD
      # ----------------------------------------
      - name: Verify build output
        run: |
          echo "==== DIST FILES ===="
          ls -la dist/
          echo "Total files: $(find dist -type f | wc -l)"

      # ----------------------------------------
      # SET DEPLOY DIRECTORY
      # ----------------------------------------
      - name: Set deploy directory
        id: set-dir
        run: |
          BRANCH="${GITHUB_REF##*/}"

          if [[ "$BRANCH" == "shaqeel" ]]; then
            echo "DIR=/home/bpyshwey/public_html/shaqeel" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "Mahki" ]]; then
            echo "DIR=/home/bpyshwey/public_html/makhi" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "mirror" ]]; then
            echo "DIR=/home/bpyshwey/public_html/mirror" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "Ishmael" ]]; then
            echo "DIR=/home/bpyshwey/public_html/ishmael" >> $GITHUB_OUTPUT
          else
            echo "DIR=/home/bpyshwey/mobile.uthutho.co.za" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------
      # SETUP SSH KEY
      # ----------------------------------------
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 1624 51.89.20.167 >> ~/.ssh/known_hosts

      # ----------------------------------------
      # DEPLOY USING RSYNC OVER SSH
      # ----------------------------------------
      - name: Deploy via rsync
        run: |
          rsync -avz --delete -e "ssh -p 1624 -o StrictHostKeyChecking=no" \
            ./dist/ ${{ secrets.FTP_USERNAME }}@51.89.20.167:${{ steps.set-dir.outputs.DIR }}/