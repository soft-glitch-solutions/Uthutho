name: Deploy via SFTP

on:
  push:
    branches:
      - main
      - shaqeel
      - Mahki
      - Ishmael
      - mirror

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # CHECKOUT
      # ----------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------
      # NODE
      # ----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ----------------------------------------
      # INSTALL
      # ----------------------------------------
      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      # ----------------------------------------
      # BUILD EXPO WEB
      # ----------------------------------------
      - name: Build Expo Web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
          EXPO_PUBLIC_GOOGLE_PLACES_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_PLACES_API_KEY }}
        run: |
          npm install undici@5.22.1 --save-exact --legacy-peer-deps
          npx expo export --platform web

      # ----------------------------------------
      # VERIFY BUILD
      # ----------------------------------------
      - name: Verify build output
        run: |
          echo "==== DIST FILES ===="
          find dist -type f | head -50

      # ----------------------------------------
      # SET DEPLOY DIRECTORY
      # CHANGE THESE TO YOUR REAL SERVER PATHS
      # ----------------------------------------
      - name: Set deploy directory
        id: set-dir
        run: |
          BRANCH="${GITHUB_REF##*/}"

          if [[ "$BRANCH" == "shaqeel" ]]; then
            echo "DIR=/public_html/shaqeel/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "Mahki" ]]; then
            echo "DIR=/public_html/makhi/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "mirror" ]]; then
            echo "DIR=/public_html/mirror/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "Ishmael" ]]; then
            echo "DIR=/public_html/ishmael/" >> $GITHUB_OUTPUT

          else
            echo "DIR=/mobile.uthutho.co.za/" >> $GITHUB_OUTPUT
          fi

          
      # ----------------------------------------
      # DEPLOY VIA SFTP
      # ----------------------------------------
      - name: Deploy via SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: 51.89.20.167
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 1624

          uploads: |
            dist/ => ${{ steps.set-dir.outputs.DIR }}