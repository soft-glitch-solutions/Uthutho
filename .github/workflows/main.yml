name: Deploy via FTP

on:
  push:
    branches:
      - main
      - shaqeel
      - Mahki
      - Ishmael
      - mirror

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build the app
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
        run: |
          npm install undici@5.22.1 --save-exact --legacy-peer-deps
          npx expo export -p web

      # Set deployment directory based on branch
      - name: Set deploy directory
        id: set-dir
        run: |
          BRANCH="${GITHUB_REF##*/}"

          if [[ "$BRANCH" == "shaqeel" ]]; then
            echo "DIR=/public_html/shaqeel/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "Mahki" ]]; then
            echo "DIR=/public_html/makhi/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "mirror" ]]; then
            echo "DIR=/public_html/mirror/" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "Ishmael" ]]; then
            echo "DIR=/public_html/ishmael/" >> $GITHUB_OUTPUT

          else
            echo "DIR=/public_html/mobile/" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          protocol: ftps
          security: loose
          port: 21

          local-dir: dist/
          server-dir: ${{ steps.set-dir.outputs.DIR }}

          dangerous-clean-slate: true

          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**